name: Preview smoke

on:
  pull_request:
  workflow_dispatch:
    inputs:
      preview_url:
        description: Cloudflare preview URL to verify after propagation
        required: false
        type: string

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test smoke checker
        run: npm run test:preview-smoke

      - name: Build site
        run: npm run build

      - name: Verify production assets
        run: npm run smoke:preview -- dist

      - name: Verify deployed preview
        if: github.event_name == 'workflow_dispatch' && inputs.preview_url != ''
        run: npm run smoke:preview -- "$PREVIEW_URL"
        env:
          PREVIEW_URL: ${{ inputs.preview_url }}
