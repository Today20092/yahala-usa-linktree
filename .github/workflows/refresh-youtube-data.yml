name: Refresh YouTube Data

on:
  schedule:
    - cron: '17 9 * * *'
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

concurrency:
  group: youtube-data-refresh
  cancel-in-progress: false

jobs:
  refresh-youtube-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install yt-dlp
        run: |
          python -m pip install --user --upgrade yt-dlp
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install dependencies
        run: npm ci
      - name: Refresh latest YouTube videos
        run: |
          npm run update:youtube
          npm run validate:data
      - name: Rebase before committing
        run: git pull --rebase --autostash origin master
      - name: Commit updated video data
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Update YouTube video data
          file_pattern: src/data/latest-youtube-videos.json src/data/youtube-videos.json
      - name: Build site
        if: steps.commit.outputs.changes_detected == 'true'
        run: npm run build
      - name: Deploy to Cloudflare
        if: steps.commit.outputs.changes_detected == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: deploy
