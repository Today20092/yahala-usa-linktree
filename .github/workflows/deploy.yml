name: Refresh YouTube Data

on:
  push:
    branches: [master]
  schedule:
    - cron: '17 9 * * *'
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: write

jobs:
  refresh-youtube-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Refresh latest YouTube video
        run: npm run update:youtube
      - name: Commit updated video data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update latest YouTube video
          file_pattern: src/data/latest-youtube-videos.json
