name: Refresh Visited Video Catalog

on:
  schedule:
    - cron: '23 10 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

concurrency:
  group: youtube-data-refresh
  cancel-in-progress: false

jobs:
  refresh-visited-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install yt-dlp
        run: |
          python -m pip install --user --upgrade yt-dlp
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install dependencies
        run: npm ci
      - name: Refresh weekly YouTube catalog
        run: |
          npm run update:youtube -- --refresh-top-videos
          npm run update:visited-videos
          npm run validate:data
      - name: Rebase before committing
        run: git pull --rebase --autostash origin master
      - name: Commit updated visited video catalog
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Update weekly YouTube catalog
          file_pattern: src/data/site.yaml src/data/latest-youtube-videos.json src/data/visited-videos.yaml src/data/youtube-videos.json src/data/geocoded-locations.json
      - name: Build site
        if: steps.commit.outputs.changes_detected == 'true'
        run: npm run build
      - name: Deploy to Cloudflare
        if: steps.commit.outputs.changes_detected == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: deploy
